<!DOCTYPE html>
<html>
<head>
  <title>สุ่มชื่อเกม</title>
</head>
<body style="background:black;color:#00ffcc;text-align:center;padding-top:100px;">

  <h1>🎮 สุ่มชื่อเกมโคตรเท่</h1>

  <input id="nameInput" placeholder="ใส่ชื่อของคุณ">
  <br><br>

  <button onclick="gen()">สุ่ม</button>
  <button onclick="copyName()">คัดลอก</button>

  <h2 id="result"></h2>

  <script>
    let prefix = ["AS", "Dark", "X", "Z", "Ghost", "Shadow"];
    let suffix = ["99", "X", "Z", "Kill", "XD", "Pro"];
    let special = ["×","々","ツ","么","★","๖"];

    function gen() {
      let name = document.getElementById("nameInput").value || "Player";

      let p = prefix[Math.floor(Math.random() * prefix.length)];
      let s = suffix[Math.floor(Math.random() * suffix.length)];
      let sp = special[Math.floor(Math.random() * special.length)];

      let finalName = p + sp + name + sp + s;

      document.getElementById("result").innerText = finalName;
    }

    function copyName() {
      let text = document.getElementById("result").innerText;
      navigator.clipboard.writeText(text);
      alert("คัดลอกแล้ว!");
    }
  </script>

</body>
</html>
