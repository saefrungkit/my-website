<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>สุ่มชื่อ</title>

  <style>
    body {
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      text-align: center;
      font-family: Arial;
      color: white;
      padding-top: 50px;
    }

    button {
      font-size: 20px;
      padding: 15px 25px;
      width: 90%;
      max-width: 300px;
      border: none;
      border-radius: 12px;
      background: #ffcc00;
      font-weight: bold;
    }

    select {
      font-size: 18px;
      padding: 10px;
      margin-bottom: 20px;
    }

    p {
      font-size: 24px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <select id="category">
    <option value="cool">เท่</option>
    <option value="funny">ฮา</option>
    <option value="english">อังกฤษ</option>
  </select>

  <br>

  <button onclick="randomName()">สุ่มชื่อ</button>

  <p id="result">---</p>

  <audio id="sound" src="click.mp3"></audio>

  <script>
    const names = {
      cool: ["Shadow", "Xero", "DarkBoy"],
      funny: ["อ้วนจัง", "หล่อไม่ไหว", "แมวขโมยข้าว"],
      english: ["Mike", "John", "Alex"]
    };

    function randomName() {
      const cat = document.getElementById("category").value;
      const list = names[cat];

      const name = list[Math.floor(Math.random() * list.length)];
      document.getElementById("result").innerText = name;

      document.getElementById("sound").play();
    }
  </script>

</body>
</html>
